name: gh-workflow
run-name: ${{ github.actor }} is learning GitHub Actions
on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      - uses: actions/deploy-pages@v4
